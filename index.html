<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PLINK-OH TV SHOW</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
color:#0ff;
text-align:center;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
background:black;
color:#0ff;
border:2px solid #0ff;
padding:10px 20px;
margin:8px;
font-size:18px;
cursor:pointer;
box-shadow:0 0 10px #0ff;
}

.hidden{display:none;}

h1,h2{
text-shadow:0 0 20px #0ff;
}
</style>
</head>

<body>

<!-- TELA A -->
<div id="startScreen" class="screen">
<h1>PLINK-OH TV SHOW</h1>
<p>Importe os arquivos:</p>
<input type="file" id="questionsFile" accept=".csv"><br><br>
<input type="file" id="groupsFile" accept=".csv"><br><br>
<button onclick="startGame()">INICIAR JOGO</button>
</div>

<!-- TELA B -->
<div id="questionScreen" class="screen hidden">
<h2 id="teamName"></h2>
<h3 id="playerName"></h3>
<h2 id="questionText"></h2>
<div id="answers"></div>
<div id="timer"></div>
</div>

<!-- TELA C -->
<div id="wrongScreen" class="screen hidden">
<h1>RESPOSTA ERRADA</h1>
<button onclick="nextRound()">Continuar</button>
</div>

<!-- TELA D -->
<div id="boardScreen" class="screen hidden"></div>

<script>
const {Engine,Render,Runner,Bodies,Composite,Events} = Matter;

let questions=[];
let groups=[];
let order=[];
let currentGroupIndex=0;
let currentQuestion=0;
let multiplier=1;
let timerInterval;

let engine,world,render,runner;
let slotValues=[100,200,300,500,300,200,100];
let slotWidth;

/* ---------- LOAD FILES ---------- */

function parseCSV(text){
return text.trim().split("\n").map(l=>l.split(","));
}

document.getElementById("questionsFile").addEventListener("change",function(e){
let reader=new FileReader();
reader.onload=function(ev){
let data=parseCSV(ev.target.result);
questions=data.map(p=>({
question:p[0],
correct:p[1],
options:shuffle([p[1],p[2],p[3],p[4]]),
multiplier:parseInt(p[5]),
time:parseInt(p[6])
}));
};
reader.readAsText(e.target.files[0]);
});

document.getElementById("groupsFile").addEventListener("change",function(e){
let reader=new FileReader();
reader.onload=function(ev){
let data=parseCSV(ev.target.result);
groups=data.map(row=>({
name:row[0],
members:row.slice(1),
draws:{}
}));
};
reader.readAsText(e.target.files[0]);
});

/* ---------- START ---------- */

function startGame(){
if(!questions.length||!groups.length){
alert("Importe os dois arquivos!");
return;
}

document.documentElement.requestFullscreen().catch(()=>{});

order=shuffle([...Array(groups.length).keys()]);
currentGroupIndex=0;

showQuestionScreen();
}

/* ---------- QUESTION FLOW ---------- */

function showQuestionScreen(){
hideAll();

let group=groups[order[currentGroupIndex]];
let member=drawMember(group);

multiplier=questions[currentQuestion].multiplier;

document.getElementById("teamName").innerText="Grupo: "+group.name;
document.getElementById("playerName").innerText="Responder: "+member;
document.getElementById("questionText").innerText=
"x"+multiplier+" - "+questions[currentQuestion].question;

let div=document.getElementById("answers");
div.innerHTML="";

questions[currentQuestion].options.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.onclick=()=>checkAnswer(o);
div.appendChild(b);
});

startTimer(questions[currentQuestion].time);

document.getElementById("questionScreen").classList.remove("hidden");
}

function checkAnswer(ans){
clearInterval(timerInterval);

if(ans===questions[currentQuestion].correct){
showBoardScreen();
}else{
document.getElementById("wrongScreen").classList.remove("hidden");
}
}

function nextRound(){
nextTurn();
showQuestionScreen();
}

/* ---------- TURN LOGIC ---------- */

function nextTurn(){
currentGroupIndex=(currentGroupIndex+1)%groups.length;
currentQuestion++;
if(currentQuestion>=questions.length){
alert("Fim do jogo!");
exitFullscreen();
location.reload();
}
}

/* ---------- MEMBER DRAW ---------- */

function drawMember(group){

let available=group.members.filter(m=>{
return !group.draws[m]||group.draws[m]<2;
});

if(!available.length){
group.draws={};
available=group.members;
}

let chosen=available[Math.floor(Math.random()*available.length)];
group.draws[chosen]=(group.draws[chosen]||0)+1;
return chosen;
}

/* ---------- TIMER ---------- */

function startTimer(sec){
let t=sec;
document.getElementById("timer").innerText="Tempo: "+t;
timerInterval=setInterval(()=>{
t--;
document.getElementById("timer").innerText="Tempo: "+t;
if(t<=0){
clearInterval(timerInterval);
document.getElementById("wrongScreen").classList.remove("hidden");
}
},1000);
}

/* ---------- BOARD ---------- */

function showBoardScreen(){
hideAll();
document.getElementById("boardScreen").classList.remove("hidden");
initBoard();
}

function initBoard(){
engine=Engine.create();
world=engine.world;

render=Render.create({
element:document.getElementById("boardScreen"),
engine:engine,
options:{
width:window.innerWidth,
height:window.innerHeight,
wireframes:false,
background:"black"
}
});

Render.run(render);
runner=Runner.create();
Runner.run(runner,engine);

slotWidth=window.innerWidth/slotValues.length;

for(let y=window.innerHeight*0.2;y<window.innerHeight*0.8;y+=70){
for(let x=80;x<window.innerWidth-80;x+=60){
Composite.add(world,Bodies.circle(x,y,8,{isStatic:true,render:{fillStyle:"#0ff"}}));
}
}

for(let i=0;i<slotValues.length;i++){
Composite.add(world,Bodies.rectangle(i*slotWidth,window.innerHeight-80,10,160,{isStatic:true,render:{fillStyle:"#0ff"}}));
}

Composite.add(world,Bodies.rectangle(window.innerWidth/2,window.innerHeight-20,window.innerWidth,40,{isStatic:true}));

document.addEventListener("click",dropBallOnce,{once:true});
}

function dropBallOnce(e){
if(e.clientY>window.innerHeight*0.25)return;

let ball=Bodies.circle(e.clientX,20,12,{restitution:0.7,render:{fillStyle:"#f0f"}});
Composite.add(world,ball);

Events.on(engine,"afterUpdate",function(){
if(ball.position.y>window.innerHeight-100){
let slot=Math.floor(ball.position.x/slotWidth);
slot=Math.max(0,Math.min(slot,slotValues.length-1));
let total=slotValues[slot]*multiplier;
alert("Pontuação: "+total);
Composite.remove(world,ball);
nextTurn();
showQuestionScreen();
}
});
}

/* ---------- UTIL ---------- */

function hideAll(){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
}

function shuffle(a){
return a.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
