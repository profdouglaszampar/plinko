<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko ∞ Universo Paralelo</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #eef2f7, #dde3ec);
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.container {
    text-align: center;
}

h1 {
    font-weight: 300;
    letter-spacing: 4px;
    color: #1a1a1a;
}

canvas {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.08);
}

button {
    margin-top: 20px;
    padding: 12px 40px;
    border-radius: 40px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    font-size: 15px;
}
</style>
</head>

<body>
<div class="container">
    <h1>PLINKO ∞</h1>
    <canvas id="board" width="420" height="600"></canvas>
    <br>
    <button onclick="startUniverse()">Abrir Portal</button>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const gravity = 0.06;
const damping = 0.94;
const pegRadius = 5;
const ballRadius = 9;
const rows = 9;

let pegs = [];
let ball = null;
let particles = [];
let trail = [];
let audioStarted = false;

// 🎵 Som ambiente etéreo
function startAudio() {
    if (audioStarted) return;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = 110; // grave suave
    gain.gain.value = 0.03;

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);
    oscillator.start();

    audioStarted = true;
}

// Criar pinos
for (let row = 0; row < rows; row++) {
    let cols = row + 3;
    let spacing = canvas.width / (cols + 1);

    for (let col = 0; col < cols; col++) {
        pegs.push({
            x: spacing * (col + 1),
            y: 100 + row * 50
        });
    }
}

// 🌫 Partículas
for (let i = 0; i < 40; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        speed: Math.random() * 0.3 + 0.1
    });
}

function drawParticles() {
    particles.forEach(p => {
        p.y -= p.speed;
        if (p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = "rgba(180,190,210,0.3)";
        ctx.fill();
    });
}

function drawPegs() {
    pegs.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, pegRadius, 0, Math.PI*2);
        ctx.fillStyle = "rgba(120,130,150,0.4)";
        ctx.fill();
    });
}

// 🌌 Rastro quântico
function drawTrail() {
    trail.forEach((t, i) => {
        ctx.beginPath();
        ctx.arc(t.x, t.y, ballRadius * (i/trail.length), 0, Math.PI*2);
        ctx.fillStyle = `rgba(100,120,255,${i/trail.length * 0.3})`;
        ctx.fill();
    });
}

function drawBall() {
    if (!ball) return;

    let hue = 200 + (ball.y / canvas.height) * 100; // ✨ muda cor conforme desce

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
    ctx.shadowColor = `hsl(${hue}, 70%, 70%)`;
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;
}

function startUniverse() {
    startAudio();

    if (ball) return;

    ball = {
        x: canvas.width / 2,
        y: 40,
        vx: (Math.random() - 0.5) * 0.6,
        vy: 0
    };

    trail = [];
    animate();
}

function updateBall() {
    if (!ball) return;

    ball.vy += gravity;
    ball.vx += (Math.random() - 0.5) * 0.01;

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.x < ballRadius || ball.x > canvas.width - ballRadius) {
        ball.vx *= -damping;
    }

    pegs.forEach(p => {
        let dx = ball.x - p.x;
        let dy = ball.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < ballRadius + pegRadius) {
            let angle = Math.atan2(dy, dx);
            ball.x = p.x + Math.cos(angle) * (ballRadius + pegRadius);
            ball.y = p.y + Math.sin(angle) * (ballRadius + pegRadius);

            let normalX = dx / dist;
            let normalY = dy / dist;
            let dot = ball.vx * normalX + ball.vy * normalY;

            ball.vx -= 2 * dot * normalX;
            ball.vy -= 2 * dot * normalY;

            ball.vx *= damping;
            ball.vy *= damping;
        }
    });

    trail.push({x: ball.x, y: ball.y});
    if (trail.length > 25) trail.shift();

    if (ball.y > canvas.height - 20) {
        ball = null;
    }
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawParticles();
    drawPegs();
    updateBall();
    drawTrail();
    drawBall();

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
