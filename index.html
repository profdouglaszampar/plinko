<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plink-Oh Neon Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:#0ff;
  font-family:Arial;
  text-align:center;
}

h1{
  text-shadow:0 0 20px #0ff;
}

button{
  background:black;
  color:#0ff;
  border:2px solid #0ff;
  padding:10px 20px;
  margin:5px;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 10px #0ff;
}

#game{display:none;}
#timer{font-size:24px; margin:10px;}
#scoreboard{margin-top:10px;}
.team{
  display:inline-block;
  margin:10px;
  padding:10px;
  border:2px solid #0ff;
  box-shadow:0 0 15px #0ff;
}
#ranking{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-size:30px;
}
canvas{
  border-top:2px solid #0ff;
}
</style>
</head>

<body>

<h1>PLINK-OH NEON</h1>

<div id="setup">
<label>Teams:</label>
<input type="number" id="teamCount" value="2" min="1" max="8"><br><br>
<input type="file" id="fileInput" accept=".csv">
</div>

<div id="game">
<h2 id="question"></h2>
<div id="timer"></div>
<div id="answers"></div>
<div id="scoreboard"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="ranking"></div>

<script>

const {Engine, Render, Runner, Bodies, Composite, Events} = Matter;

let engine = Engine.create();
let world = engine.world;

let render = Render.create({
  element: document.body,
  engine: engine,
  options: {
    width: 600,
    height: 700,
    wireframes: false,
    background: "black"
  }
});

Render.run(render);
Runner.run(Runner.create(), engine);

let slotValues=[100,200,300,500,300,200,100];
let slotWidth=600/slotValues.length;

let questions=[], current=0;
let teams=[], currentTeam=0;
let multiplier=1;
let timerInterval;

/* ---------- BOARD ---------- */

function createBoard(){

  for(let y=100;y<600;y+=70){
    for(let x=80;x<520;x+=60){
      let peg=Bodies.circle(x,y,8,{
        isStatic:true,
        render:{fillStyle:"#0ff"}
      });
      Composite.add(world,peg);
    }
  }

  for(let i=0;i<slotValues.length;i++){
    let wall=Bodies.rectangle(i*slotWidth,650,10,100,{
      isStatic:true,
      render:{fillStyle:"#0ff"}
    });
    Composite.add(world,wall);
  }

  let ground=Bodies.rectangle(300,690,600,20,{
    isStatic:true,
    render:{fillStyle:"#0ff"}
  });
  Composite.add(world,ground);
}

createBoard();

/* ---------- GAME SETUP ---------- */

document.getElementById("fileInput").addEventListener("change",function(e){

  document.documentElement.requestFullscreen();

  let teamCount=parseInt(document.getElementById("teamCount").value);
  teams=[];
  for(let i=0;i<teamCount;i++){
    teams.push({name:"Team "+(i+1),score:0});
  }

  let file=e.target.files[0];
  let reader=new FileReader();

  reader.onload=function(ev){
    let lines=ev.target.result.trim().split("\n");
    questions=lines.map(l=>{
      let p=l.split(",");
      return{
        question:p[0],
        correct:p[1],
        options:shuffle([p[1],p[2],p[3],p[4]]),
        multiplier:parseInt(p[5]),
        time:parseInt(p[6])
      }
    });

    document.getElementById("setup").style.display="none";
    document.getElementById("game").style.display="block";
    updateScoreboard();
    showQuestion();
  }

  reader.readAsText(file);
});

/* ---------- QUESTION ---------- */

function showQuestion(){
  let q=questions[current];
  multiplier=q.multiplier;

  document.getElementById("question").innerText=
   teams[currentTeam].name+" | x"+multiplier+" | "+q.question;

  let div=document.getElementById("answers");
  div.innerHTML="";

  q.options.forEach(o=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>checkAnswer(o);
    div.appendChild(b);
  });

  startTimer(q.time);
}

function checkAnswer(ans){
  clearInterval(timerInterval);

  if(ans===questions[current].correct){
    playSound("correct");
    enableBallDrop();
  }else{
    playSound("wrong");
    nextTurn();
  }
}

function startTimer(sec){
  let t=sec;
  document.getElementById("timer").innerText="Time: "+t;

  timerInterval=setInterval(()=>{
    t--;
    document.getElementById("timer").innerText="Time: "+t;
    if(t<=0){
      clearInterval(timerInterval);
      nextTurn();
    }
  },1000);
}

/* ---------- BALL DROP ---------- */

function enableBallDrop(){
  document.addEventListener("click",dropBallOnce,{once:true});
}

function dropBallOnce(e){
  let x=e.clientX;
  let ball=Bodies.circle(x,20,12,{
    restitution:0.6,
    render:{fillStyle:"#f0f"}
  });

  Composite.add(world,ball);
  playSound("drop");

  Events.on(engine,"collisionStart",function(event){
    event.pairs.forEach(pair=>{
      if(pair.bodyA===ball || pair.bodyB===ball){
        if(ball.position.y>630){
          calculateScore(ball.position.x);
          Composite.remove(world,ball);
        }
      }
    });
  });
}

function calculateScore(x){
  let slot=Math.floor(x/slotWidth);
  if(slot<0)slot=0;
  if(slot>=slotValues.length)slot=slotValues.length-1;

  let total=slotValues[slot]*multiplier;
  teams[currentTeam].score+=total;

  updateScoreboard();
  nextTurn();
}

/* ---------- TURN / END ---------- */

function nextTurn(){
  currentTeam=(currentTeam+1)%teams.length;
  showQuestion();
}

function nextQuestion(){
  current++;
  if(current<questions.length){
    showQuestion();
  }else{
    showRanking();
  }
}

/* ---------- RANKING ---------- */

function showRanking(){
  let ranking=document.getElementById("ranking");
  ranking.style.display="flex";

  teams.sort((a,b)=>b.score-a.score);

  ranking.innerHTML="<h1>FINAL RANKING</h1>";
  teams.forEach((t,i)=>{
    ranking.innerHTML+=
      "<div>"+(i+1)+"º - "+t.name+" : "+t.score+"</div>";
  });

  ranking.style.animation="fadein 2s";
}

/* ---------- UI ---------- */

function updateScoreboard(){
  let sb=document.getElementById("scoreboard");
  sb.innerHTML="";
  teams.forEach(t=>{
    sb.innerHTML+=
      `<div class="team">${t.name}<br>${t.score}</div>`;
  });
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

/* ---------- SOUND ---------- */

function playSound(type){
  let audio=new Audio();
  if(type==="correct")
    audio.src="https://assets.mixkit.co/sfx/preview/mixkit-game-show-correct-answer-829.mp3";
  if(type==="wrong")
    audio.src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-950.mp3";
  if(type==="drop")
    audio.src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3";
  audio.play();
}

</script>
</body>
</html>
